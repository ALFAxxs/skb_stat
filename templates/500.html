<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Server xatosi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-box {
            background: #fff;
            border-radius: 16px;
            padding: 60px 48px;
            text-align: center;
            box-shadow: 0 4px 32px rgba(0,0,0,0.08);
            max-width: 480px;
            width: 100%;
        }
        .error-num {
            font-size: 96px;
            font-weight: 800;
            color: #c0392b;
            line-height: 1;
            margin-bottom: 8px;
            letter-spacing: -4px;
        }
        .error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .error-title {
            font-size: 22px;
            font-weight: 600;
            color: #212529;
            margin-bottom: 10px;
        }
        .error-text {
            color: #6c757d;
            font-size: 15px;
            margin-bottom: 32px;
        }
        .btn-home {
            background: #1F4E79;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 32px;
            font-size: 15px;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s;
        }
        .btn-home:hover {
            background: #163a5f;
            color: #fff;
        }
        .btn-back {
            background: #f8f9fa;
            color: #495057;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            margin-left: 10px;
            transition: background 0.2s;
        }
        .btn-back:hover {
            background: #e9ecef;
            color: #212529;
        }
    </style>
</head>
<body>
    <div class="error-box">
        <div class="error-icon">⚙️</div>
        <div class="error-num">500</div>
        <div class="error-title">Server xatosi</div>
        <div class="error-text">
            Texnik nosozlik yuz berdi.<br>
            Administrator xabardor qilindi. Iltimos, keyinroq urinib ko'ring.
        </div>
        <a href="/patients/" class="btn-home">🏠 Bosh sahifaga</a>
        <a href="javascript:history.back()" class="btn-back">← Orqaga</a>
    </div>
</body>
</html>
