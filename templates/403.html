{% load i18n %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "403 — Kirish taqiqlangan" %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/design_system.css' %}">
    <style>
        body{min-height:100vh; display:flex; align-items:center; justify-content:center;}
        .error-box{background:var(--card); border-radius:18px; padding:56px 44px; text-align:center; box-shadow:0 8px 30px rgba(15,23,42,.08); max-width:460px; width:100%;}
        .error-icon{width:64px; height:64px; border-radius:50%; background:var(--warning-light); color:var(--warning); font-size:30px; display:flex; align-items:center; justify-content:center; margin:0 auto 18px;}
        .error-num{font-size:64px; font-weight:800; color:var(--warning); line-height:1; letter-spacing:-2px;}
        .error-title{font-size:19px; font-weight:700; margin:8px 0 10px;}
        .error-text{color:var(--ink-faint); font-size:14px; margin-bottom:28px;}
    </style>
</head>
<body>
    <div class="error-box">
        <div class="error-icon"><i class="bi bi-lock-fill"></i></div>
        <div class="error-num">403</div>
        <div class="error-title">{% trans "Kirish taqiqlangan" %}</div>
        <div class="error-text">
            {% trans "Xavfsizlik tekshiruvi muvaffaqiyatsiz tugadi." %}<br>
            {% trans "Sahifani yangilab qayta urinib ko'ring." %}
        </div>
        <a href="/patients/" class="btn btn-primary px-4"><i class="bi bi-house-door"></i> {% trans "Bosh sahifaga" %}</a>
        <a href="javascript:location.reload()" class="btn btn-outline-secondary px-4"><i class="bi bi-arrow-clockwise"></i> {% trans "Yangilash" %}</a>
    </div>
</body>
</html>
